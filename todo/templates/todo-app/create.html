{% extends 'base.html' %}

{% block header %}
    <h1>{% block title %}New Task{% endblock %}</h1>
{% endblock %}

{% block content %}
    <form method="post">
        <label for="task">Task</label>
        <input name="task" id="task" value="{{ request.form['task'] }}" required>
        <label for="expiration_date">Expiration Date</label>
        <input name="expiration_date" id="expiration_date" value="{{ request.form['expiration_date'] }}" type="date" required>
        <input type="submit" value="Save">
    </form>
{% endblock %}
